<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakshitha BirthDay</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background-image: url("r1.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: 1s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 15px red, 0 0 30px crimson;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff0000; }
      to { text-shadow: 0 0 25px #ff4444, 0 0 50px #ff0000; }
    }

    .countdown {
      display: flex;
      gap: 20px;
      font-size: 2rem;
      z-index: 2;
    }

    .countdown div {
      position: relative;
      width: 180px;
      height: 200px;
      border-radius: 15px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .countdown div:hover {
      transform: scale(1.1);
    }

    .countdown div img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      filter: brightness(0.8);
    }

    .countdown div span,
    .countdown div div {
      position: relative;
      z-index: 2;
    }

    .countdown div div {
      font-size: 2rem;
      font-weight: bold;
    }

    .countdown div span {
      font-size: 1rem;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 1rem;
      color: #fff;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    /* Birthday Message Style */
    .birthday-message {
      font-size: 3rem;
      text-shadow: 0 0 20px gold, 0 0 40px orange;
      animation: zoomIn 2s ease forwards;
    }

    @keyframes zoomIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <h1>Happy Birthday Rakshitha 🎉</h1>

  <div class="countdown">
    <div>
      <img src="r6.jpg">
      <div id="days">00</div>
      <span>Days</span>
    </div>
    <div>
      <img src="r5.jpg">
      <div id="hours">00</div>
      <span>Hours</span>
    </div>
    <div>
      <img src="r7.jpg">
      <div id="minutes">00</div>
      <span>Minutes</span>
    </div>
    <div>
      <img src="r3.jpg">
      <div id="seconds">00</div>
      <span>Seconds</span>
    </div>
  </div>

  <footer><h2>Made by Yashive...</h2></footer>

  <script>
    const targetDate = new Date("March 04, 2026 00:00:00").getTime();

    const countdown = () => {
      const now = new Date().getTime();
      const difference = targetDate - now;

      if (difference <= 0) {
        clearInterval(timer);

        // Hide countdown elements
        document.querySelector("h1").style.display = "none";
        document.querySelector(".countdown").style.display = "none";
        document.querySelector("footer").style.display = "none";

        // Change whole background to birthday image
        document.body.style.backgroundImage = "url('r2.jpg')";

        // Remove dark overlay
        document.body.style.setProperty("--overlay", "transparent");
        document.body.style.backgroundColor = "black";

        // Create Birthday Message
        const message = document.createElement("div");
        message.classList.add("birthday-message");
        message.innerHTML = "🎂 Happy Birthday Rakshitha 🎉";
        document.body.appendChild(message);

        return;
      }

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days.toString().padStart(2, "0");
      document.getElementById("hours").innerText = hours.toString().padStart(2, "0");
      document.getElementById("minutes").innerText = minutes.toString().padStart(2, "0");
      document.getElementById("seconds").innerText = seconds.toString().padStart(2, "0");
    };

    const timer = setInterval(countdown, 1000);
    countdown();
  </script>

</body>
</html>
